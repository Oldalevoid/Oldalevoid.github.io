<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singolo articolo</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<style>
     :root {
    box-sizing: border-box;
    --black-color: rgb(78, 2, 2);
    --footer-bk-color: white;
    --back_color_for_all: white;
    /** dichiarare i colori qui **/
  }
  
  *,
  ::after,
  ::before {
    box-sizing: inherit;
    margin: 0.5em;
  }
  
  body * + * {
    margin-top: 1.5em;
    font-family: Arial, sans-serif;
  }
  
  header {
    margin-bottom: 1.5em;
  }
  
  .hflex {
    display: flex;
    justify-content: space-between;
  }
  
  .social {
    display: flex;
    line-height: 5em;
    margin-left: 45em;
  }
  
  .immagec {
    display: block;
    margin-left: auto;
    margin-right: auto;
    width: 70%;
  }
  
  
  h1 {
    font-size: 4em;
    font-weight: 700;
    font-family: Georgia, "Times New Roman", Times, serif;
    text-align: center;
  }
  
  
  main {
    max-width: 1080px;
    margin: 0 auto;
  }
  
  /** section **/
  
  section::after {
    display: block;
    content: " ";
    clear: both;
  }
  
  section {
    margin-right: -1.5em;
    margin-bottom: -1.5em;
  } 
  
  section::before {
    display: table;
    content: " ";
  }
  
  /** articles **/
  
  article {
    float: left;
    width: calc(50% - 1.5em);
    border: 1px solid var(--black-color);
  }
  
  article h4 {
    margin: 0;
  }
  
  .articles > :nth-child(2n + 1) {
    clear: left;
  }
  
  .articles img {
    float: left;
    margin: 0 1.5em 1.5em 0;
  }
  
  .articles .article-body {
    overflow: auto;
  }
  
  /** header **/
  
  header {
    background-color: var(--back_color_for_all);
    padding: 1.5em;
  }
  
  .header-nav {
    display: flex;
    padding: 0.5em;
    list-style-type: none;
    background-color: var(--black-color);
  }
  
  .header-nav > li {
    margin-top: 0;
  }
  
  .header-nav > li > a {
    display: block;
    padding: 0.5em 1em;
    background-color: var(--back_color_for_all);
    color: var(--black-color);
    text-decoration: none;
  }
  
  .header-nav > li:nth-child(1n + 2) {
    margin-left: 0.5em;
  }
  
  .header-nav > li.nav-right {
    margin-left: auto;
  }
  
  /** footer **/
  footer {
    background-color: var(--black-color);
    color: var(--footer-bk-color);
  }
  
  .footer-nav {
    display: flex;
    padding: 0.5em;
    list-style-type: none;
  }
  
  
  
  /** griglia centrale **/
  .centergrid {
    background-color: var(--back_color_for_all);
    display: grid;
    grid-template-rows: 1fr;
    grid-column-gap: 10px;
    grid-row-gap: 0px;
    border: 1px solid var(--black-color);
    text-align: justify;
    align-items: self-end;
  }
  
  .first {
  
    grid-area: 1 / 1 / 2 / 2;
  }
  .second {
  
    grid-area: 1 / 2 / 2 / 3;
  }
  .third {
  
    grid-area: 1 / 3 / 2 / 4;
  }
  
  .centergrid:nth-child(n) {
    border-radius: 5px;
    padding: 10px;
  }
  
  aside {
    float: left;
  }
</style>
<body>
   
    
</body>
</html>
