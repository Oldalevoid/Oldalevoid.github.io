<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selettori</title>
    <link rel="stylesheet" href="css/selettori.css" />   

    <style>
hr {
  width: 100%;
  margin: 50px auto;
  color: rgb(0, 0, 0);
}

/* header */

/* Important */
#important .better {
  background-color: gray;
  border: none !important;
}

#important #winning {
  background-color: red;
  border: 1px solid black;
}

#important p {
  color: white;
  background-color: blue;
  padding: 5px;
}

/* Selector weight example */

/* specificity: 0201; */
#weight #outer a {
    background-color: red;
  }
  
  /* specificity: 0301; */
  #weight #outer #inner a {
    background-color: blue;
  }
  
  /* specificity: 0204; */
  #weight #outer div ul li a {
    color: yellow;
  }
  
  /* specificity: 0213; */
  #weight #outer div ul .nav a {
    color: white;
  }
  
  
  /* specificity: 0133; */
  #weight div div .nav:nth-child(2) a:hover {
    border: 10px double gray;
  }
  
  #weight a {
    display: inline-block;
    line-height: 40px;
    font-size: 20px;
    text-decoration: none;
    text-align: center;
    width: 200px;
    margin-bottom: 10px;
  }
  
  #weight ul {
    padding: 0;
  }
  
  #weight li {
    list-style-type: none;
  }
  
  /* live sample styling */
  
  #live #outer div ul .nav a {
    background-color: blue;
    padding: 5px;
    display: inline-block;
    margin-bottom: 10px;
  }
  
  #live div div li a {
  color: yellow;
  }
  
  #live #outer #inner a {
    background-color: initial;
    color: red;
  }
  

    </style>
</head>
<body>
    <body>
        <div id="important">
          <p class="better">This is a paragraph.</p>
          <p class="better" id="winning">Prendiamo Winning!!</p>
        </div>

        <p>Testo libero</p>
    
        <hr>
    
        <div id="weight">
          <div id="outer" class="container">
            <div id="inner" class="container">
              <ul>
                <li class="nav"><a href="#">One</a></li>
                <li class="nav"><a href="#">Two</a></li>
              </ul>
            </div>
          </div>
        </div>
    
        <hr>
    
        <div id="live">
          <div id="outer" class="container">
            <div id="inner" class="container">
              <ul>
                <li class="nav"><a href="#">One</a></li>
                <li class="nav"><a href="#">Two</a></li>
              </ul>
            </div>
          </div>
        </div>    
    
</body>
</html>
