<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prima Pagina</title>
    <link rel="stylesheet" href="css/mybootlocal.css"/>
    <style>
        .row+.row {
            margin-top: 1rem;
        }

        .row {
            background-color: rgba(39, 41, 43, 0.03);
            --bs-gutter-x: 1.5rem;
            --bs-gutter-y: 0;
            display: flex;
            flex-wrap: wrap;
            margin-top: calc(-1 * var(--bs-gutter-y));
            margin-right: calc(-.5 * var(--bs-gutter-x));
            margin-left: calc(-.5 * var(--bs-gutter-x));
        }

        .row>[class="col-"] {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
            background-color: rgba(39, 41, 43, 0.03);
            border: 1px solid rgba(39, 41, 43, 0.1);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row">
         <div class="col-sm-8">
            <p>Sono Cesare Marinangeli, e ho caccato i bandalognel</p>
         </div>
         <div class="col-sm-2">
            <p>Sì</p>
        </div>
        <div class="col-sm-2">
        <p> copiosamente </p>
        </div>
    </div>
    
</body>
</html>
